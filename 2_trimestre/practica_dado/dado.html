<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jesús David Cosano" />
    <title>Dado</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>Dado</header>
    <main>
      <section class="container">
        <div class="dice">
          <div class="inside-dice">
            <div class="dot center"></div>
          </div>
        </div>
        <div class="dice">
          <div class="inside-dice">
            <div class="dot top-left"></div>
            <div class="dot lower-right"></div>
          </div>
        </div>
        <div class="dice">
          <div class="inside-dice">
            <div class="dot top-right"></div>
            <div class="dot center"></div>
            <div class="dot lower-left"></div>
          </div>
        </div>
        <div class="dice">
          <div class="inside-dice">
            <div class="dot top-left"></div>
            <div class="dot top-right"></div>
            <div class="dot lower-left"></div>
            <div class="dot lower-right"></div>
          </div>
        </div>
        <div class="dice">
          <div class="inside-dice">
            <div class="dot top-left"></div>
            <div class="dot top-right"></div>
            <div class="dot lower-left"></div>
            <div class="dot lower-right"></div>
            <div class="dot center"></div>
          </div>
        </div>
        <div class="dice">
          <div class="inside-dice">
            <div class="dot top-left"></div>
            <div class="dot top-right"></div>
            <div class="dot lower-left"></div>
            <div class="dot lower-right"></div>
            <div class="dot middle-left"></div>
            <div class="dot middle-right"></div>
          </div>
        </div>
      </section>
    </main>
    <footer>&copy; Jesús David Cosano</footer>

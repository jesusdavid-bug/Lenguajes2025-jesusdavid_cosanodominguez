<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Ajedrez - Flexbox</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header>
        <h1>Tablero de Ajedrez (Flexbox)</h1>
        <p class="author">Por Jesús</p>
    </header>

    <main class="main-content">
        <div class="board-container">
            <div class="chessboard">
                <!-- Fila de letras superior (row 0) -->
                <div class="cell corner-top-left"></div>
                <div class="cell label-letter-top horizontal-bg">h</div>
                <div class="cell label-letter-top horizontal-bg">g</div>
                <div class="cell label-letter-top horizontal-bg">f</div>
                <div class="cell label-letter-top horizontal-bg">e</div>
                <div class="cell label-letter-top horizontal-bg">d</div>
                <div class="cell label-letter-top horizontal-bg">c</div>
                <div class="cell label-letter-top horizontal-bg">b</div>
                <div class="cell label-letter-top horizontal-bg">a</div>
                <div class="cell corner-top-right"></div>

                <!-- Fila 8 (Blancas) (row 1) -->
                <div class="cell label-vertical label-top-left">8</div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/torreblanca.png" alt="Torre Blanca"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/caballoblanco.png" alt="Caballo Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/alfilblanco.png" alt="Alfil Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/reinablanca.png" alt="Reina Blanca"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/reyblanco.png" alt="Rey Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/alfilblanco.png" alt="Alfil Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/caballoblanco.png" alt="Caballo Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/torreblanca.png" alt="Torre Blanca"></div>
                <div class="cell label-vertical label-top-right">1</div>

                <!-- Fila 7 (Peones Blancos) (row 2) -->
                <div class="cell label-vertical vertical-bg">7</div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/blancas/peonblanco.png" alt="Peón Blanco"></div>
                <div class="cell label-vertical vertical-bg">2</div>

                <!-- Fila 6 (Vacía) (row 3) -->
                <div class="cell label-vertical vertical-bg">6</div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell label-vertical vertical-bg">3</div>

                <!-- Fila 5 (Vacía) (row 4) -->
                <div class="cell label-vertical vertical-bg">5</div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell label-vertical vertical-bg">4</div>

                <!-- Fila 4 (Vacía) (row 5) -->
                <div class="cell label-vertical vertical-bg">4</div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell label-vertical vertical-bg">5</div>

                <!-- Fila 3 (Vacía) (row 6) -->
                <div class="cell label-vertical vertical-bg">3</div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell square white"></div>
                <div class="cell square black"></div>
                <div class="cell label-vertical vertical-bg">6</div>

                <!-- Fila 2 (Peones Negros) (row 7) -->
                <div class="cell label-vertical vertical-bg">2</div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/peonnegro.png" alt="Peón Negro"></div>
                <div class="cell label-vertical vertical-bg">7</div>

                <!-- Fila 1 (Negras) (row 8) -->
                <div class="cell label-vertical label-bottom-left">1</div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/torrenegra.png" alt="Torre Negra"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/caballonegro.png" alt="Caballo Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/alfilnegro.png" alt="Alfil Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/reinanegra.png" alt="Reina Negra"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/reynegro.png" alt="Rey Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/alfilnegro.png" alt="Alfil Negro"></div>
                <div class="cell square white"><img src="../ajedrez_tablas/images/negras/caballonegro.png" alt="Caballo Negro"></div>
                <div class="cell square black"><img src="../ajedrez_tablas/images/negras/torrenegra.png" alt="Torre Negra"></div>
                <div class="cell label-vertical label-bottom-right">8</div>

                <!-- Fila de letras inferior (row 9) -->
                <div class="cell corner-bottom-left"></div>
                <div class="cell label-letter-bottom horizontal-bg">a</div>
                <div class="cell label-letter-bottom horizontal-bg">b</div>
                <div class="cell label-letter-bottom horizontal-bg">c</div>
                <div class="cell label-letter-bottom horizontal-bg">d</div>
                <div class="cell label-letter-bottom horizontal-bg">e</div>
                <div class="cell label-letter-bottom horizontal-bg">f</div>
                <div class="cell label-letter-bottom horizontal-bg">g</div>
                <div class="cell label-letter-bottom horizontal-bg">h</div>
                <div class="cell corner-bottom-right"></div>
            </div>
        </div>
    </main>

    <footer class="footer-content">
        <p>¿Quieres más información sobre el ajedrez? <a href="https://es.wikipedia.org/wiki/Ajedrez">Haz click aquí</a></p>
        <p>¿Quieres jugar al ajedrez? <a href="https://www.chess.com/">Haz click aquí</a></p>
        <hr>
        <p><a href="../../index.html"><button type="button">Volver al índice principal</button></a></p>
    </footer>

    <a href="../../../index.html" class="floating-btn">Volver al Index</a>
</body>
</html>
